name: Feature request
description: Suggest a new feature
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: textarea
    id: feature
    attributes:
      label: Feature description
      description: What feature would you like to see?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?

  - type: textarea
    id: solution
    attributes:
      label: Possible solution
