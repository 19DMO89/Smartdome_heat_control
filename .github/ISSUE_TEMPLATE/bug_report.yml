name: Bug report
description: Report a bug in Smartdome Heat Control
title: "[BUG] "
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please provide the following information.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.3.1

  - type: input
    id: integration_version
    attributes:
      label: Smartdome Heat Control version
      placeholder: e.g. 2.3.14

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste Home Assistant logs if available.
