<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Smartdome Heat Control</title>
    <style>
        :root {
            --primary: #ff9800; --bg: #111; --card-bg: #1c1c1e;
            --text: #fff; --accent: #03a9f4; --heating: #ff5722;
        }
        body { font-family: Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .stats-bar { width: 100%; max-width: 1000px; margin-bottom: 20px; display: flex; gap: 20px; font-size: 0.9em; color: var(--accent); }

        .config-section { width: 100%; max-width: 1000px; background: #252527; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #333; }
        .global-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }

        #room-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; padding-bottom: 100px; }
        .room-card { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid #333; position: relative; }
        .room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* Styling für die HA Picker */
        ha-entity-picker { display: block; margin-bottom: 15px; --ha-card-background: #2c2c2e; }
        
        .temp-row { display: flex; gap: 10px; margin-top: 10px; }
        input[type="number"], input { background: #2c2c2e; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; width: 100%; }

        .save-bar { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; pointer-events: none; }
        .save-btn { pointer-events: auto; background: var(--primary); border: none; padding: 15px 60px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 20px rgba(255,152,0,0.4); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Smartdome Heat</h1>
        <div id="stats" class="stats-bar">Lade Status...</div>
    </div>

    <div class="config-section">
        <div style="margin-bottom:10px; font-weight:bold; color:var(--primary)">⚙️ Haupteinstellungen</div>
        <div class="global-grid">
            <div>
                <label style="font-size:0.8em">Hauptthermostat</label>
                
            </div>
            <div><label style="font-size:0.8em">Nacht-Start</label><input type="text" id="night_start"></div>
            <div><label style="font-size:0.8em">Boost-Start</label><input type="text" id="boost_start"></div>
        </div>
    </div>

    <div id="room-container"></div>

    <div class="save-bar"><button class="save-btn" onclick="saveToHA()">Konfiguration Speichern</button></div>

    <script>
        const hass = window.parent.document.querySelector("home-assistant").hass;
        let currentConfig = {};

        function init() {
            if (!hass) return;
            const state = hass.states["smartdome_heat_control.config"];
            if (state) {
                currentConfig = JSON.parse(JSON.stringify(state.attributes));
                setupGlobal();
                renderRooms();
                updateStats();
            }
        }

        function setupGlobal() {
            const picker = document.getElementById('main_thermostat_picker');
            picker.hass = hass;
            picker.value = currentConfig.main_thermostat;
            picker.addEventListener('value-changed', (ev) => { currentConfig.main_thermostat = ev.detail.value; });
            
            document.getElementById('night_start').value = currentConfig.night_start;
            document.getElementById('boost_start').value = currentConfig.morning_boost_start;
        }

        function renderRooms() {
            const container = document.getElementById('room-container');
            container.innerHTML = "";
            Object.entries(currentConfig.rooms).forEach(([id, room]) => {
                const card = document.createElement('div');
                card.className = 'room-card';
                card.innerHTML = `
                    <div class="room-header"><b style="color:var(--primary)">${room.label || id}</b></div>
                    <label style="font-size:0.7em">Thermostat</label>
                    
                    <label style="font-size:0.7em">Sensor</label>
                    
                    <div class="temp-row">
                        <input type="number" step="0.5" value="${room.target_day}" onchange="currentConfig.rooms['${id}'].target_day=this.value">
                        <input type="number" step="0.5" value="${room.target_night}" onchange="currentConfig.rooms['${id}'].target_night=this.value">
                    </div>
                `;
                container.appendChild(card);
                
                // Picker mit HA verbinden
                const tPicker = card.querySelector('.room-thermostat');
                const sPicker = card.querySelector('.room-sensor');
                tPicker.hass = sPicker.hass = hass;
                tPicker.value = room.thermostat;
                sPicker.value = room.sensor;
                
                tPicker.addEventListener('value-changed', (ev) => { currentConfig.rooms[id].thermostat = ev.detail.value; });
                sPicker.addEventListener('value-changed', (ev) => { currentConfig.rooms[id].sensor = ev.detail.value; });
            });
        }

        function updateStats() {
            const total = Object.keys(currentConfig.rooms).length;
            const heating = Object.values(hass.states).filter(s => s.entity_id.startsWith('climate.') && s.attributes.hvac_action === 'heating').length;
            document.getElementById('stats').innerHTML = `🏠 Räume: ${total} | 🔥 Aktiv am Heizen: ${heating}`;
        }

        async function saveToHA() {
            await hass.callWS({ type: "smartdome_heat_control/save_config", config: currentConfig });
            alert("Gespeichert!");
        }

        window.onload = init;
    </script>
</body>
</html>
